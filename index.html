@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--amber:#d29922;--red:#f85149;--pink:#f778ba;

  --border:#30363d;--border2:#444c56;
  --r:8px;--r2:12px;--r3:16px;--sidebar:240px;--tr:.2s ease;
}
.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f3f6;--bg4:#e1e4e8;
  --blue:#0969da;--blue2:#0550ae;--green:#1a7f37;--amber:#9a6700;--red:#d1242f;--pink:#bf4b8a;
  --text:#1f2328;--text2:#656d76;--text3:#9198a1;

}
html,body{height:100%;font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;background:var(--bg);color:var(--text);transition:background var(--tr),color var(--tr)}
/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--tr)}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo .app-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px}
.sb-logo .app-sub{font-size:11px;color:var(--text2);margin-top:3px;padding-left:34px}
.logo-icon{width:24px;height:24px;background:var(--blue2);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background var(--tr)}
.sb-user:hover{background:var(--bg3)}
.s-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all var(--tr);border-left:2px solid transparent;background:none;border-right:none;border-top:none;border-bottom:none;font-family:inherit;width:100%}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--blue);background:rgba(88,166,255,.08);border-left-color:var(--blue)}
.nav-item svg,.nav-item i{width:18px;height:18px;font-size:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.sb-bottom{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--tr);position:relative;font-family:inherit}
.icon-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.desk-fab{width:100%;padding:9px 16px;background:var(--blue2);border:none;color:#fff;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;transition:all var(--tr);margin-bottom:6px}
.desk-fab:hover{background:var(--blue)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.page-content{flex:1;overflow-y:auto;padding:20px}
.page-content::-webkit-scrollbar{width:6px}
.page-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* MOBILE HEADER */
.mob-hdr{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 14px;align-items:center;justify-content:space-between;flex-shrink:0}

.mob-actions{display:flex;gap:7px}
/* BOTTOM NAV */
.bnav{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:6px 0 max(10px,env(safe-area-inset-bottom));flex-shrink:0}
.bnav-inner{display:flex}

.bnav-btn i{font-size:22px}

.bnav-dot{position:absolute;top:3px;right:calc(50% - 14px);width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}

.fab{position:fixed;bottom:74px;right:14px;width:52px;height:52px;border-radius:50%;background:var(--blue2);border:none;cursor:pointer;align-items:center;justify-content:center;color:#fff;z-index:40;box-shadow:0 4px 18px rgba(31,111,235,.4);transition:all var(--tr);display:none}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;transition:border-color var(--tr)}

.meta{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:8px;align-items:center}
.meta i{font-size:13px;vertical-align:-2px;margin-right:3px}
.obs-box{font-size:12px;color:var(--text2);background:var(--bg3);padding:9px 12px;border-radius:var(--r);border-left:3px solid var(--blue2);margin-top:8px;line-height:1.5}
.mat-box{font-size:12px;color:#ff7b72;background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.2);border-radius:var(--r);padding:9px 12px;margin-top:8px;display:flex;gap:8px;align-items:flex-start}

.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;gap:6px;transition:all var(--tr);font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.btn i{font-size:14px}
.btn-primary{background:var(--blue2);color:#fff;border-color:var(--blue2)}
.btn-primary:hover{background:var(--blue);border-color:var(--blue)}
.btn-success{background:rgba(63,185,80,.12);color:#56d364;border:1px solid rgba(63,185,80,.25)}
.btn-success:hover{background:rgba(63,185,80,.2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}

.btn-full{width:100%;justify-content:center}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
/* STAT */
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}

.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.day-name{font-size:14px;font-weight:600;color:var(--text)}
.day-today{color:var(--blue)}
.day-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.prog-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:10px}

/* CHART */

.bf-high{background:var(--red)}.bf-mid{background:var(--amber)}.bf-low{background:var(--blue2)}
.insight{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:var(--r2);padding:14px;margin-bottom:14px}

.seg-btn.active{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
/* SEARCH */

.form-inp,.form-sel,.form-ta{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border var(--tr)}

.rpt-pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-wrap;word-break:break-all}

// ── STORAGE DUPLO: localStorage + window.storage (Claude) ────────────────────
const STORE_KEY = 'mgl_v5';
async function loadDB() {
  let raw = null;
  // tenta localStorage primeiro (offline/standalone)
  try { raw = localStorage.getItem(STORE_KEY); } catch(e){}
  // fallback: window.storage (Claude artifact)
  if (!raw && typeof window.storage !== 'undefined') {
    try { const r = await window.storage.get(STORE_KEY); if(r&&r.value) raw=r.value; } catch(e){}
  }
  if (raw) {
    try { const p=JSON.parse(raw); Object.assign(S,p); S.user=null; } catch(e){}
  }
}
async function saveDB() {
  const data = JSON.stringify(S);
  try { localStorage.setItem(STORE_KEY, data); } catch(e){}
  if (typeof window.storage !== 'undefined') {
    try { await window.storage.set(STORE_KEY, data); } catch(e){}
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.className = S.theme==='light'?'light':'';
  const mc = document.getElementById('theme-color-meta');
  if(mc) mc.content = S.theme==='light'?'#ffffff':'#0d1117';
}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';applyTheme();saveDB();render();}
function toast(msg) {
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400);
}
function $(id){return document.getElementById(id);}
function qv(id){const e=$(id);return e?e.value:'';}

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────────────
function render(){
  applyTheme();
  const root=$('root'), fab=$('fab-btn');
  if(!S.user){root.innerHTML=renderLogin();fab.classList.add('hidden');renderNotifDrawer();return;}
  root.innerHTML=renderShell();
  const showFab=S.tab==='preventivas'||S.tab==='corretivas';
  fab.classList.toggle('hidden',!showFab);
  fab.onclick=openNew;
  renderNotifDrawer();
}

          <button class="icon-btn" onclick="toggleTheme()">${ico(S.theme==='dark'?'sun':'moon')}</button>

        </div>

function switchTab(t){S.tab=t;saveDB();render();}
function renderTab(){
  if(S.tab==='preventivas') return renderPreventivas();
  if(S.tab==='corretivas')  return renderCorretivas();
  if(S.tab==='indicadores') return renderIndicadores();
  if(S.tab==='relatorios')  return renderRelatorios();
  if(S.tab==='historico')   return renderHistorico();
  return '';
}
function renderInline(){const pc=$('page-content');if(pc)pc.innerHTML=renderTab();}

// ── PREVENTIVAS ───────────────────────────────────────────────────────────────
function renderPreventivas(){
  let tasks=S.preventivas;
  if(S.searchPrev) tasks=tasks.filter(t=>t.nome.toLowerCase().includes(S.searchPrev.toLowerCase()));
  let h=`<div class="search-wrap">${ico('search',16)}<input placeholder="Buscar preventiva…" oninput="S.searchPrev=this.value;renderInline()" value="${S.searchPrev}"></div>`;
  DAYS.forEach((dia,idx)=>{
    const dt=tasks.filter(p=>p.dia===dia); if(!dt.length) return;
    const dn=dt.filter(t=>t.done).length;
    const pct=dt.length?Math.round(dn/dt.length*100):0;
    const pfCls=pct===100?'done':pct>0?'part':'';
    const isToday=idx===TODAY_IDX;
    h+=`<div class="day-block">
      <div class="day-hdr">
        <span class="day-name${isToday?' day-today':''}">${dia}${isToday?' — Hoje':''}</span>
        <span class="day-count">${dn}/${dt.length}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill ${pfCls}" style="width:${pct}%"></div></div>`;
    dt.forEach(t=>{
      // Chip de "concluído por" — sem ícone de usuário, só texto com cor
      const doneChip = t.doneBy
        ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;background:rgba(63,185,80,.12);color:#56d364;border:1px solid rgba(63,185,80,.25);border-radius:20px;padding:2px 8px;margin-top:4px">
            ${ico('check',11,'#56d364')} ${t.doneBy} · ${t.doneAt}
           </span>`
        : '';
      const obsLine = t.obs
        ? `<div class="task-sub" style="display:flex;align-items:center;gap:4px">${ico('notes',11)} ${t.obs}</div>`
        : '';
      h+=`<div class="task-row" onclick="togglePrev(${t.id})">
        <div class="chk${t.done?' done':''}">${t.done?ico('check',11,'white'):''}</div>
        <div class="pdot p-${t.pri||'media'}"></div>
        <div class="task-info">
          <div class="task-name${t.done?' done':''}">${t.turno} — ${t.nome}</div>
          ${obsLine}${doneChip}
        </div>
        <button class="task-edit-btn" onclick="event.stopPropagation();editPrev(${t.id})" title="Editar">${ico('pencil',15)}</button>
      </div>`;
    });
    h+=`</div>`;
  });
  return h;
}

// ── CORRETIVAS ────────────────────────────────────────────────────────────────
function renderCorretivas(){
  const f=S.filterCorr||'todos';
  let list=S.corretivas;
  if(f==='aberto')    list=list.filter(c=>c.status==='aberto');
  else if(f==='andamento') list=list.filter(c=>c.status==='andamento');
  else if(f==='concluido') list=list.filter(c=>c.status==='concluido');
  else if(f==='material')  list=list.filter(c=>c.mat);
  let h=`<div class="seg-ctrl">
    ${[['todos','Todos'],['aberto','Em aberto'],['andamento','Andamento'],['concluido','Concluídas'],['material','C/ Material']].map(([v,l])=>
      `<button class="seg-btn${f===v?' active':''}" onclick="S.filterCorr='${v}';renderInline()">${l}</button>`
    ).join('')}
  </div>`;
  if(!list.length){h+=`<div class="empty"><div style="opacity:.25;margin:0 auto 12px;display:flex;justify-content:center">${ico('check',44)}</div><p>Nenhuma corretiva neste filtro</p></div>`;return h;}
  list.forEach(c=>{h+=cardCorr(c);});
  return h;
}
function cardCorr(c){
  const sm={aberto:'b-open',andamento:'b-prog',concluido:'b-done'};
  const sl={aberto:'Em aberto',andamento:'Em andamento',concluido:'Concluída'};
  return `<div class="card">
    <div class="card-hdr">
      <div style="display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0">
        <div class="pdot p-${c.pri||'media'}" style="margin-top:5px;flex-shrink:0"></div>
        <div class="card-title">${c.desc}</div>
      </div>
      <span class="badge ${sm[c.status]}">${sl[c.status]}</span>
    </div>
    <div class="meta">
      <span>${ico('settings',13)} ${c.equip}</span>
      <span style="font-size:11px;background:rgba(88,166,255,.1);color:var(--blue);border-radius:10px;padding:1px 7px">${c.resp}</span>
      <span>${ico('calcheck',13)} ${c.inicio}</span>
      ${c.fim?`<span>${ico('flag',13)} ${c.fim}</span>`:''}
      ${c.req?`<span>${ico('package',13)} ${c.req}</span>`:''}
    </div>
    ${c.mat?`<div class="mat-box"><span style="flex-shrink:0;margin-top:1px">${ico('alert',14)}</span><span><strong>Material faltando:</strong> ${c.mat}</span></div>`:''}
    ${c.obs?`<div class="obs-box">${ico('notes',13)} ${c.obs}</div>`:''}
    <div class="btn-row">
      ${c.status!=='concluido'?`<button class="btn btn-success btn-sm" onclick="concluirCorr(${c.id})">${ico('check',13,'#56d364')} Concluir</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="editCorr(${c.id})">${ico('pencil',13)} Editar</button>
    </div>
  </div>`;
}

// ── INDICADORES ───────────────────────────────────────────────────────────────
function renderIndicadores(){
  const total=S.corretivas.length;
  const abertas=S.corretivas.filter(c=>c.status!=='concluido').length;
  const concluidas=S.corretivas.filter(c=>c.status==='concluido').length;
  const semMat=S.corretivas.filter(c=>c.mat).length;
  const pT=S.preventivas.length,pD=S.preventivas.filter(p=>p.done).length;
  const pPct=pT?Math.round(pD/pT*100):0;
  const alta=S.corretivas.filter(c=>c.pri==='alta'&&c.status!=='concluido').length;
  const freq={};
  S.corretivas.forEach(c=>{freq[c.equip]=(freq[c.equip]||0)+1;});
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const maxF=sorted.length?sorted[0][1]:1;
  return `
    <div class="grid-4" style="margin-bottom:18px">
      <div class="stat-card"><div class="stat-lbl">${ico('tool',15)}Corretivas</div><div class="stat-num">${total}</div><div class="stat-sub">${abertas} em aberto</div><div class="stat-trend ${abertas>2?'trend-down':'trend-up'}">${abertas>2?'⚠ Atenção':'✓ Ok'}</div></div>
      <div class="stat-card"><div class="stat-lbl">${ico('calcheck',15)}Preventivas</div><div class="stat-num">${pPct}%</div><div class="stat-sub">${pD}/${pT} concluídas</div><div class="stat-trend ${pPct>=70?'trend-up':'trend-down'}">${pPct>=70?'✓ Em dia':'⚠ Atenção'}</div></div>
      <div class="stat-card"><div class="stat-lbl">${ico('alertoct',15)}Alta prioridade</div><div class="stat-num">${alta}</div><div class="stat-sub">corretivas urgentes</div><div class="stat-trend ${alta>0?'trend-down':'trend-up'}">${alta>0?'⚠ Urgente':'✓ Nenhuma'}</div></div>
      <div class="stat-card"><div class="stat-lbl">${ico('package',15)}Requisições</div><div class="stat-num">${semMat}</div><div class="stat-sub">aguardando material</div></div>
    </div>
    ${sorted.length?`<span class="sec-lbl">Corretivas por equipamento</span>
    <div class="card" style="margin-bottom:14px">
      ${sorted.map(([eq,n])=>{const p=Math.round(n/maxF*100);const cls=p>=80?'bf-high':p>=50?'bf-mid':'bf-low';
        return `<div class="bar-row"><div class="bar-lbl" title="${eq}">${eq}</div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${p}%">${n}</div></div></div>`;
      }).join('')}
    </div>
    <div class="insight"><div class="insight-ttl">${ico('bulb',15)}Recomendação preventiva</div>
    <div class="insight-txt"><strong>${sorted[0][0]}</strong> concentra o maior número de corretivas (${sorted[0][1]}). Recomenda-se antecipar a preventiva desse equipamento para reduzir falhas não planejadas.</div></div>`:''}`;
}

// ── RELATÓRIOS ────────────────────────────────────────────────────────────────
function renderRelatorios(){
  return `<span class="sec-lbl">Gerar relatório</span>
    <div class="card" style="margin-bottom:14px">
      <div class="form-grp"><label class="form-lbl">Período</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" id="rp-hoje" onclick="selPer('hoje',this)" style="border-color:var(--blue);color:var(--blue)">Hoje</button>
          <button class="btn" id="rp-semana" onclick="selPer('semana',this)">Semana</button>
          <button class="btn" id="rp-mes" onclick="selPer('mes',this)">Mês</button>
        </div>
      </div>
    </div>
    <button class="rpt-btn green" onclick="gerarRpt('whatsapp')">${ico('wa',18)}Enviar via WhatsApp</button>
    <button class="rpt-btn blue" onclick="gerarRpt('copiar')">${ico('copy',18)}Copiar resumo (texto)</button>
    <button class="rpt-btn" onclick="gerarRpt('imprimir')">${ico('printer',18)}Imprimir / Salvar PDF</button>
    <div id="rpt-out"></div>`;
}
function selPer(p,btn){
  ['rp-hoje','rp-semana','rp-mes'].forEach(id=>{const e=$(id);if(e){e.style.borderColor='';e.style.color='';}});
  if(btn){btn.style.borderColor='var(--blue)';btn.style.color='var(--blue)';}
}
function gerarRpt(tipo){
  const hoje=new Date().toLocaleDateString('pt-BR');
  const pD=S.preventivas.filter(p=>p.done).length;
  const pP=S.preventivas.filter(p=>!p.done).length;
  const cAb=S.corretivas.filter(c=>c.status!=='concluido');
  const cFin=S.corretivas.filter(c=>c.status==='concluido');
  const semMat=S.corretivas.filter(c=>c.mat);
  let txt=`*RELATÓRIO MANUTENÇÃO GLP*\n*Data: ${hoje}*\n${'─'.repeat(32)}\n\n`;
  txt+=`📋 *PREVENTIVAS*\n✅ Concluídas: ${pD}/${S.preventivas.length}\n⏳ Pendentes: ${pP}\n\n`;
  txt+=`🔧 *CORRETIVAS*\n🔴 Em aberto: ${cAb.filter(c=>c.status==='aberto').length}\n🟡 Em andamento: ${cAb.filter(c=>c.status==='andamento').length}\n✅ Concluídas: ${cFin.length}\n`;
  if(semMat.length){txt+=`\n⚠️ *MATERIAIS NECESSÁRIOS*\n`;semMat.forEach(c=>{txt+=`• ${c.equip}: ${c.mat}${c.req?' ('+c.req+')':''}\n`;});}
  if(cAb.length){txt+=`\n📌 *CORRETIVAS EM ABERTO*\n`;cAb.forEach(c=>{txt+=`• ${c.equip}: ${c.desc}\n  Desde: ${c.inicio}${c.obs?' | '+c.obs:''}\n`;});}
  txt+=`\n${'─'.repeat(32)}\nResponsável: ${S.user?.name||'—'}`;
  if(tipo==='whatsapp'){window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');}
  else if(tipo==='copiar'){
    navigator.clipboard?.writeText(txt).then(()=>toast('Copiado para área de transferência!'));
    const out=$('rpt-out');
    if(out) out.innerHTML=`<div class="rpt-pre">${txt.replace(/\*/g,'').replace(/</g,'&lt;')}</div>`;
  } else {
    const w=window.open('','_blank');
    if(w){w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Relatório Manutenção GLP</title><style>body{font-family:monospace;padding:30px;font-size:14px;line-height:1.9;color:#111;white-space:pre-wrap;max-width:700px;margin:0 auto}</style></head><body>${txt.replace(/\*/g,'').replace(/</g,'&lt;')}</body></html>`);w.print();}
  }
}

    ${conc.length?conc.map(c=>`<div class="card">
      <div class="card-hdr"><div class="card-title">${c.desc}</div><span class="badge b-done">Concluída</span></div>
      <div class="meta">
        <span>${ico('settings',13)} ${c.equip}</span>
        <span style="font-size:11px;background:rgba(88,166,255,.1);color:var(--blue);border-radius:10px;padding:1px 7px">${c.resp}</span>
        <span>${ico('calcheck',13)} ${c.inicio}</span>
        <span>${ico('flag',13)} ${c.fim||'—'}</span>
      </div>
      ${c.obs?`<div class="obs-box">${ico('notes',13)} ${c.obs}</div>`:''}
    </div>`).join(''):
    `<div class="empty"><div style="opacity:.25;margin:0 auto 12px;display:flex;justify-content:center">${ico('tool',44)}</div><p>Nenhuma corretiva concluída ainda</p></div>`}
    <div class="divider"></div>
    <span class="sec-lbl">Preventivas concluídas</span>
    ${prevDone.length?prevDone.map(t=>`<div class="task-row" style="cursor:default">
      <div class="chk done">${ico('check',11,'white')}</div>
      <div class="pdot p-${t.pri||'media'}"></div>
      <div class="task-info"><div class="task-name done">${t.turno} — ${t.nome}</div>
      <div class="task-sub">${t.dia} · ${t.doneBy||'—'} · ${t.doneAt||'—'}</div></div>
    </div>`).join(''):
    `<div class="empty"><div style="opacity:.25;margin:0 auto 12px;display:flex;justify-content:center">${ico('calcheck',44)}</div><p>Nenhuma preventiva concluída ainda</p></div>`}`;
}

// ── NOTIFICAÇÕES ──────────────────────────────────────────────────────────────

  const d=$('notif-drawer'); if(!d) return;
  const unread=S.notificacoes.filter(n=>!n.lida).length;
  const iconMap={alert:'alert',mat:'package',done:'check'};
  const colMap={alert:'var(--amber)',mat:'var(--pink)',done:'var(--green)'};
  d.innerHTML=`<div class="notif-hdr">
    <h2 style="display:flex;align-items:center;gap:8px">${ico('bell',18)}Notificações${unread?` <span class="badge b-open">${unread}</span>`:''}</h2>
    <button class="icon-btn" onclick="closeNotif()">${ico('x')}</button>
  </div>
  <div class="notif-list">
    ${S.notificacoes.length?S.notificacoes.map(n=>`<div class="notif-item${!n.lida?' notif-unread':''}" onclick="readNotif(${n.id})">
      <div class="ni-icon" style="background:${colMap[n.tipo]}20;color:${colMap[n.tipo]}">${ico(iconMap[n.tipo]||'bell',17)}</div>
      <div class="ni-body"><div class="ntl">${n.titulo}</div><div class="nsb">${n.sub}</div><div class="nts">${n.ts}</div></div>
    </div>`).join(''):
    `<div class="empty"><div style="opacity:.25;margin:0 auto 12px;display:flex;justify-content:center">${ico('belloff',44)}</div><p>Sem notificações</p></div>`}
  </div>
  <div class="notif-footer">
    <button class="btn btn-ghost btn-full" onclick="marcarLidas()">${ico('checks',14)} Marcar todas como lidas</button>

function openNotif(){$('notif-drawer')?.classList.add('open');$('backdrop')?.classList.add('open');}
function closeNotif(){$('notif-drawer')?.classList.remove('open');$('backdrop')?.classList.remove('open');}
function readNotif(id){const n=S.notificacoes.find(x=>x.id===id);if(n)n.lida=true;saveDB();renderNotifDrawer();render();}
function marcarLidas(){S.notificacoes.forEach(n=>n.lida=true);saveDB();renderNotifDrawer();render();}

// ── AÇÕES ─────────────────────────────────────────────────────────────────────
function togglePrev(id){
  const t=S.preventivas.find(p=>p.id===id);if(!t)return;
  t.done=!t.done;
  if(t.done){t.doneBy=S.user?.name||'?';t.doneAt=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}
  else{t.doneBy='';t.doneAt='';}
  saveDB();renderInline();toast(t.done?'Preventiva concluída ✓':'Preventiva reaberta');
}
function editPrev(id){
  const t=S.preventivas.find(p=>p.id===id);if(!t)return;
  showModal(`<div class="modal-ttl">${ico('calcheck',18)}Editar preventiva</div>
    <div class="form-grp"><label class="form-lbl">Tarefa</label>
      <div style="font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border)">${t.turno} — ${t.nome}</div>
    </div>
    <div class="form-grp"><label class="form-lbl">Prioridade</label>
      <select class="form-sel" id="p-pri">
        <option value="alta"${t.pri==='alta'?' selected':''}>🔴 Alta</option>
        <option value="media"${t.pri==='media'?' selected':''}>🟡 Média</option>
        <option value="baixa"${t.pri==='baixa'?' selected':''}>🟢 Baixa</option>
      </select>
    </div>
    <div class="form-grp"><label class="form-lbl">Observação</label>
      <textarea class="form-ta" id="p-obs">${t.obs||''}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="savePrev(${id})">${ico('check',14,'white')} Salvar</button>
      <button class="btn btn-ghost" onclick="closeModal()">${ico('x',14)} Cancelar</button>
    </div>`);
}
function savePrev(id){
  const t=S.preventivas.find(p=>p.id===id);
  if(t){t.obs=qv('p-obs');t.pri=qv('p-pri')||'media';}
  saveDB();closeModal();renderInline();toast('Observação salva');
}
function editCorr(id){
  const c=S.corretivas.find(x=>x.id===id);if(!c)return;
  showModal(`<div class="modal-ttl">${ico('tool',18)}Editar corretiva</div>
    <div class="form-grp"><label class="form-lbl">Equipamento</label><input class="form-inp" id="e-eq" value="${c.equip}"></div>
    <div class="form-grp"><label class="form-lbl">Descrição</label><textarea class="form-ta" id="e-desc">${c.desc}</textarea></div>
    <div class="form-grp"><label class="form-lbl">Status</label>
      <select class="form-sel" id="e-st">
        <option value="aberto"${c.status==='aberto'?' selected':''}>Em aberto</option>
        <option value="andamento"${c.status==='andamento'?' selected':''}>Em andamento</option>
        <option value="concluido"${c.status==='concluido'?' selected':''}>Concluída</option>
      </select>
    </div>
    <div class="form-grp"><label class="form-lbl">Prioridade</label>
      <select class="form-sel" id="e-pri">
        <option value="alta"${c.pri==='alta'?' selected':''}>🔴 Alta</option>
        <option value="media"${c.pri==='media'?' selected':''}>🟡 Média</option>
        <option value="baixa"${c.pri==='baixa'?' selected':''}>🟢 Baixa</option>
      </select>
    </div>
    <div class="form-grp"><label class="form-lbl">Material faltando</label><input class="form-inp" id="e-mat" value="${c.mat||''}" placeholder="Ex: 2x mangueira pneumática 1/2&quot;"></div>
    <div class="form-grp"><label class="form-lbl">Nº Requisição</label><input class="form-inp" id="e-req" value="${c.req||''}" placeholder="Ex: REQ-046"></div>
    <div class="form-grp"><label class="form-lbl">Observação</label><textarea class="form-ta" id="e-obs">${c.obs||''}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveCorr(${id})">${ico('check',14,'white')} Salvar</button>
      <button class="btn btn-ghost" onclick="closeModal()">${ico('x',14)} Cancelar</button>
    </div>`);
}
function saveCorr(id){
  const c=S.corretivas.find(x=>x.id===id);
  if(c){
    c.equip=qv('e-eq')||c.equip;c.desc=qv('e-desc')||c.desc;
    c.status=qv('e-st')||c.status;c.pri=qv('e-pri')||c.pri;
    c.mat=qv('e-mat');c.req=qv('e-req');c.obs=qv('e-obs');
    if(c.status==='concluido'&&!c.fim)c.fim=new Date().toLocaleDateString('pt-BR');
  }
  saveDB();closeModal();renderInline();toast('Corretiva atualizada');
}
function concluirCorr(id){
  const c=S.corretivas.find(x=>x.id===id);
  if(c){c.status='concluido';c.fim=new Date().toLocaleDateString('pt-BR');}
  saveDB();renderInline();toast('Corretiva concluída ✓');
}

// ── NOVA TAREFA ───────────────────────────────────────────────────────────────
function openNew(){
  if(S.tab==='preventivas'){
    showModal(`<div class="modal-ttl">${ico('calplus',18)}Nova preventiva</div>
      <div class="form-grp"><label class="form-lbl">Dia da semana</label>
        <select class="form-sel" id="n-dia">${DAYS.map(d=>`<option>${d}</option>`).join('')}</select>
      </div>
      <div class="form-grp"><label class="form-lbl">Turno</label>
        <select class="form-sel" id="n-turno"><option>1º S</option><option>2º S</option><option>3º S</option><option>4º S</option></select>
      </div>
      <div class="form-grp"><label class="form-lbl">Prioridade</label>
        <select class="form-sel" id="n-pri">
          <option value="alta">🔴 Alta</option><option value="media" selected>🟡 Média</option><option value="baixa">🟢 Baixa</option>
        </select>
      </div>
      <div class="form-grp"><label class="form-lbl">Descrição da tarefa</label>
        <input class="form-inp" id="n-nome" placeholder="Ex: Lubrificação dos rodeiros…">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addPrev()">${ico('check',14,'white')} Adicionar</button>
        <button class="btn btn-ghost" onclick="closeModal()">${ico('x',14)} Cancelar</button>
      </div>`);
  } else if(S.tab==='corretivas'){
    showModal(`<div class="modal-ttl">${ico('tool',18)}Novo chamado / corretiva</div>
      <div class="form-grp"><label class="form-lbl">Equipamento</label><input class="form-inp" id="c-eq" placeholder="Ex: Carrossel Linha 1"></div>
      <div class="form-grp"><label class="form-lbl">Descrição do problema</label><textarea class="form-ta" id="c-desc" placeholder="Descreva o chamado…"></textarea></div>
      <div class="form-grp"><label class="form-lbl">Status inicial</label>
        <select class="form-sel" id="c-st">
          <option value="aberto">Em aberto</option>
          <option value="andamento">Em andamento</option>
          <option value="concluido">Concluída</option>
        </select>
      </div>
      <div class="form-grp"><label class="form-lbl">Prioridade</label>
        <select class="form-sel" id="c-pri">
          <option value="alta">🔴 Alta</option><option value="media" selected>🟡 Média</option><option value="baixa">🟢 Baixa</option>
        </select>
      </div>
      <div class="form-grp"><label class="form-lbl">Material faltando (se houver)</label>
        <input class="form-inp" id="c-mat" placeholder="Ex: mangueira pneumática 1/2&quot;">
      </div>
      <div class="form-grp"><label class="form-lbl">Nº Requisição</label>
        <input class="form-inp" id="c-req" placeholder="Ex: REQ-046">
      </div>
      <div class="form-grp"><label class="form-lbl">Observação</label>
        <textarea class="form-ta" id="c-obs" placeholder="Detalhes adicionais…"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addCorr()">${ico('check',14,'white')} Registrar</button>
        <button class="btn btn-ghost" onclick="closeModal()">${ico('x',14)} Cancelar</button>
      </div>`);
  }
}
function addPrev(){
  const nome=qv('n-nome').trim();if(!nome)return;
  S.preventivas.push({id:S.nextId++,dia:qv('n-dia'),turno:qv('n-turno'),nome,pri:qv('n-pri')||'media',done:false,obs:'',doneBy:'',doneAt:''});
  saveDB();closeModal();renderInline();toast('Preventiva adicionada');
}
function addCorr(){
  const eq=qv('c-eq').trim(),desc=qv('c-desc').trim();
  if(!eq||!desc)return;
  const status=qv('c-st'),hoje=new Date().toLocaleDateString('pt-BR'),mat=qv('c-mat');
  S.corretivas.push({id:S.nextId++,equip:eq,desc,status,pri:qv('c-pri')||'media',inicio:hoje,fim:status==='concluido'?hoje:'',obs:qv('c-obs'),mat,req:qv('c-req'),resp:S.user?.name||'?'});
  if(mat){S.notificacoes.unshift({id:S.nextId++,tipo:'mat',titulo:'Material necessário registrado',sub:`${eq}: ${mat}`,lida:false,ts:'Agora'});}
  saveDB();closeModal();renderInline();toast('Chamado registrado');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(inner){
  $('modal-root').innerHTML=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${inner}</div></div>`;
}
function closeModal(){$('modal-root').innerHTML='';}

// ── SERVICE WORKER (PWA offline) ──────────────────────────────────────────────
if('serviceWorker' in navigator){
  const sw=`const C='mgl-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const rc=res.clone();caches.open(C).then(c=>c.put(e.request,rc));return res;}).catch(()=>caches.match('/'))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadDB().then(render);
</script>
</body>
</html>
