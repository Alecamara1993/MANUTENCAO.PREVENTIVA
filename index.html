<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Manutenção GLP">
<meta name="theme-color" content="#0d1117">
<title>Manutenção GLP — Carrosseis</title>

<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "Manutenção GLP",
  short_name: "Manutenção GLP",
  description: "Sistema de gestão de manutenção de carrosseis GLP",
  start_url: "./",
  display: "standalone",
  background_color: "#0d1117",
  theme_color: "#1f6feb",
  orientation: "portrait-primary",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231f6feb'/><text y='.9em' font-size='70' x='12'>⚙️</text></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231f6feb'/><text y='.9em' font-size='70' x='12'>⚙️</text></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--amber:#d29922;--red:#f85149;--pink:#f778ba;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --border:#30363d;--border2:#444c56;
  --r:8px;--r2:12px;--r3:16px;
  --sidebar:240px;
  --tr:.2s ease;
}
.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f3f6;--bg4:#e1e4e8;
  --blue:#0969da;--blue2:#0550ae;--green:#1a7f37;--amber:#9a6700;--red:#d1242f;--pink:#bf4b8a;
  --text:#1f2328;--text2:#656d76;--text3:#9198a1;
  --border:#d0d7de;--border2:#afb8c1;
}

html,body{height:100%;font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;background:var(--bg);color:var(--text);transition:background var(--tr),color var(--tr);overflow:hidden}

/* ── LAYOUT ─────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--tr)}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo .app-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px}
.sb-logo .app-sub{font-size:11px;color:var(--text2);margin-top:3px;padding-left:34px}
.logo-icon{width:24px;height:24px;background:var(--blue2);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background var(--tr)}
.sb-user:hover{background:var(--bg3)}
.s-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all var(--tr);border-left:2px solid transparent;background:none;border-right:none;border-top:none;border-bottom:none;font-family:inherit;width:100%}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--blue);background:rgba(88,166,255,.08);border-left-color:var(--blue)}
.nav-item svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.sb-bottom{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--tr);position:relative}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.desk-fab{width:100%;padding:9px 16px;background:var(--blue2);border:none;color:#fff;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;transition:all var(--tr);margin-bottom:6px}
.desk-fab:hover{background:var(--blue)}
.desk-fab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.topbar-title svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.page-content{flex:1;overflow-y:auto;padding:20px}
.page-content::-webkit-scrollbar{width:6px}
.page-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* MOBILE HEADER */
.mob-header{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 14px;align-items:center;justify-content:space-between;flex-shrink:0}
.mob-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.mob-actions{display:flex;gap:7px}

/* BOTTOM NAV */
.bnav{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:6px 0 10px;flex-shrink:0}
.bnav-inner{display:flex}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:inherit;font-size:9px;font-weight:500;transition:color var(--tr);position:relative}
.bnav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bnav-btn.active{color:var(--blue)}
.bnav-dot{position:absolute;top:3px;right:calc(50% - 14px);width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}

/* FAB MOBILE */
.fab{position:fixed;bottom:74px;right:14px;width:52px;height:52px;border-radius:50%;background:var(--blue2);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:#fff;font-size:26px;z-index:40;box-shadow:0 4px 18px rgba(31,111,235,.4);transition:all var(--tr)}
.fab:hover{background:var(--blue);transform:scale(1.06)}
.fab svg{width:24px;height:24px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}.bnav{display:block}.mob-header{display:flex}.topbar{display:none}
  .fab{display:flex}.page-content{padding:12px}.fab.hidden{display:none!important}
  .grid-4{grid-template-columns:repeat(2,minmax(0,1fr))!important}
}
@media(min-width:769px) and (max-width:1024px){
  :root{--sidebar:58px}
  .sb-logo .app-name span,.sb-logo .app-sub,.sb-user .su-info,.nav-item span,.desk-fab span{display:none}
  .sb-logo{padding:14px;display:flex;justify-content:center}
  .sb-logo .app-name{justify-content:center}
  .sb-user{justify-content:center;padding:12px}
  .nav-item{justify-content:center;padding:12px}
  .desk-fab{justify-content:center;padding:10px}
  .sb-bottom{justify-content:center;flex-direction:column;align-items:center}
}
@media(min-width:769px){.fab{display:none!important}}
@media(min-width:1400px){.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))!important}}

/* ── COMPONENTS ─────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;flex:1;min-width:0}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.b-open{background:rgba(248,81,73,.12);color:#ff7b72;border:1px solid rgba(248,81,73,.25)}
.b-prog{background:rgba(210,153,34,.12);color:#e3b341;border:1px solid rgba(210,153,34,.25)}
.b-done{background:rgba(63,185,80,.12);color:#56d364;border:1px solid rgba(63,185,80,.25)}
.b-prev{background:rgba(88,166,255,.12);color:#79c0ff;border:1px solid rgba(88,166,255,.25)}
.light .b-open{background:rgba(209,36,47,.08);color:#cf222e;border-color:rgba(209,36,47,.2)}
.light .b-prog{background:rgba(154,103,0,.08);color:#9a6700;border-color:rgba(154,103,0,.2)}
.light .b-done{background:rgba(26,127,55,.08);color:#1a7f37;border-color:rgba(26,127,55,.2)}
.light .b-prev{background:rgba(9,105,218,.08);color:#0969da;border-color:rgba(9,105,218,.2)}
.meta{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:8px;align-items:center}
.meta svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;margin-right:2px}
.obs-box{font-size:12px;color:var(--text2);background:var(--bg3);padding:9px 12px;border-radius:var(--r);border-left:3px solid var(--blue2);margin-top:8px;line-height:1.5}
.mat-box{font-size:12px;color:#ff7b72;background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.2);border-radius:var(--r);padding:9px 12px;margin-top:8px;display:flex;gap:8px;align-items:flex-start}
.mat-box svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:1px}
.light .mat-box{color:#cf222e;background:rgba(209,36,47,.05)}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;gap:6px;transition:all var(--tr);font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:var(--blue2);color:#fff;border-color:var(--blue2)}
.btn-primary:hover{background:var(--blue);border-color:var(--blue)}
.btn-success{background:rgba(63,185,80,.12);color:#56d364;border:1px solid rgba(63,185,80,.25)}
.btn-success:hover{background:rgba(63,185,80,.2)}
.btn-full{width:100%;justify-content:center}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media(min-width:900px){.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}}

/* STAT CARDS */
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-lbl svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.stat-num{font-size:28px;font-weight:600;color:var(--text);font-family:'IBM Plex Mono',monospace;line-height:1}
.stat-sub{font-size:11px;color:var(--text2);margin-top:5px}
.stat-trend{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;margin-top:7px}
.trend-up{background:rgba(63,185,80,.1);color:#56d364}
.trend-down{background:rgba(248,81,73,.1);color:#ff7b72}

/* TASK ROWS */
.task-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all var(--tr)}
.task-row:hover{border-color:var(--border2);background:var(--bg3)}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--tr)}
.chk.done{background:var(--green);border-color:var(--green);color:#fff}
.chk.done svg{width:11px;height:11px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.task-info{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-sub{font-size:11px;color:var(--text3);margin-top:2px}
.task-edit-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:5px;font-size:17px;transition:color var(--tr)}
.task-edit-btn:hover{color:var(--text2)}
.task-edit-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.day-block{margin-bottom:20px}
.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.day-name{font-size:14px;font-weight:600;color:var(--text)}
.day-today{color:var(--blue)}
.day-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;border-radius:2px;transition:width .5s}
.pf-done{background:var(--green)}.pf-part{background:var(--amber)}.pf-zero{background:var(--border2)}

/* PRIORITY DOTS */
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.p-alta{background:var(--red)}.p-media{background:var(--amber)}.p-baixa{background:var(--green)}

/* CHART BARS */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{font-size:12px;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:24px;background:var(--bg3);border-radius:5px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff;min-width:24px;transition:width .7s}
.bf-high{background:var(--red)}.bf-mid{background:var(--amber)}.bf-low{background:var(--blue2)}
.insight{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.insight-ttl{font-size:12px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:7px;margin-bottom:6px}
.insight-ttl svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.insight-txt{font-size:12px;color:var(--text2);line-height:1.6}

/* FILTERS */
.seg-ctrl{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:16px;overflow-x:auto}
.seg-btn{flex:1;padding:7px 8px;border-radius:6px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);transition:all var(--tr);white-space:nowrap}
.seg-btn.active{background:var(--bg2);color:var(--text);border:1px solid var(--border)}

/* SEARCH */
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;margin-bottom:14px;transition:border var(--tr)}
.search-wrap:focus-within{border-color:var(--blue)}
.search-wrap svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:13px}
.search-wrap input::placeholder{color:var(--text3)}

/* FORMS */
.form-grp{margin-bottom:14px}
.form-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.form-inp,.form-sel,.form-ta{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border var(--tr)}
.form-inp:focus,.form-sel:focus,.form-ta:focus{border-color:var(--blue)}
.form-ta{resize:vertical;min-height:78px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
@media(min-width:769px){.overlay{align-items:center}}
.modal{background:var(--bg2);border-radius:var(--r3) var(--r3) 0 0;padding:22px 18px 30px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;border:1px solid var(--border)}
@media(min-width:769px){.modal{border-radius:var(--r3);padding:24px 22px}}
.modal-ttl{font-size:15px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:9px}
.modal-ttl svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* NOTIF DRAWER */
.notif-drawer{position:fixed;top:0;right:0;width:320px;height:100%;background:var(--bg2);border-left:1px solid var(--border);z-index:300;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.3)}
.notif-drawer.open{transform:translateX(0)}
@media(max-width:480px){.notif-drawer{width:100%}}
.notif-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-hdr h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.notif-list{flex:1;overflow-y:auto}
.notif-item{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;cursor:pointer;transition:background var(--tr)}
.notif-item:hover{background:var(--bg3)}
.notif-unread{background:rgba(88,166,255,.04)}
.ni-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni-icon svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ni-body .ntl{font-size:13px;font-weight:500;color:var(--text)}
.ni-body .nsb{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4}
.ni-body .nts{font-size:10px;color:var(--text3);margin-top:4px}
.notif-footer{padding:12px 18px;border-top:1px solid var(--border)}
.backdrop{position:fixed;inset:0;z-index:299;display:none}
.backdrop.open{display:block}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:28px;width:100%;max-width:370px}
.login-hd{text-align:center;margin-bottom:24px}
.login-icon{width:62px;height:62px;background:var(--blue2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px}
.login-hd h1{font-size:21px;font-weight:600}
.login-hd p{font-size:13px;color:var(--text2);margin-top:4px}
.login-theme{position:absolute;top:16px;right:16px}
.user-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg3);cursor:pointer;width:100%;margin-bottom:8px;transition:all var(--tr);font-family:inherit}
.user-btn:hover{border-color:var(--blue);background:var(--bg4)}
.ub-info{flex:1;text-align:left}
.ub-name{font-size:14px;font-weight:500;color:var(--text)}
.ub-role{font-size:11px;color:var(--text2)}
.ub-arrow{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* REPORT */
.rpt-btn{width:100%;padding:13px 16px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg2);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:8px;transition:all var(--tr);font-family:inherit}
.rpt-btn:hover{border-color:var(--border2);background:var(--bg3)}
.rpt-btn.blue{border-color:rgba(88,166,255,.3);color:var(--blue)}
.rpt-btn.green{border-color:rgba(63,185,80,.3);color:var(--green)}
.rpt-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rpt-pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-wrap;word-break:break-all}

/* MISC */
.divider{height:1px;background:var(--border);margin:14px 0}
.sec-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:0 0 8px;display:block}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty svg{width:44px;height:44px;stroke:currentColor;fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 12px;display:block;opacity:.25}
.empty p{font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);border-radius:40px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--text);z-index:500;display:flex;align-items:center;gap:8px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.toast.show{opacity:1}

/* INSTALL BANNER */
.install-banner{background:rgba(31,111,235,.12);border:1px solid rgba(88,166,255,.25);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.install-banner p{font-size:12px;color:var(--text2);flex:1;line-height:1.4}
.install-banner strong{color:var(--blue)}
</style>
</head>

function loadDB() {
  try {
    const raw = localStorage.getItem('mgl_v4');
    if (raw) { const p = JSON.parse(raw); Object.assign(S, p); S.user = null; }
  } catch(e) {}
}
function saveDB() {
  try { localStorage.setItem('mgl_v4', JSON.stringify(S)); } catch(e) {}
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.className = S.theme === 'light' ? 'light' : '';
  document.querySelector('meta[name="theme-color"]').content = S.theme === 'light' ? '#ffffff' : '#0d1117';
}
function toggleTheme() {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  applyTheme(); saveDB(); render();
}
function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function $(id) { return document.getElementById(id); }
function qv(id) { return ($(id) && $(id).value) || ''; }

function render() {
  applyTheme();

  if (!S.user) {
    root.innerHTML = renderLogin();
    fab.style.display = 'none';
    renderNotifDrawer();
    return;

    <div style="position:fixed;top:16px;right:16px;z-index:10">
      <button class="icon-btn" onclick="toggleTheme()" title="Alternar tema" style="background:var(--bg2)">${I[S.theme==='dark'?'sun':'moon']}</button>

        <button class="btn btn-primary" onclick="addUser()" style="padding:9px 14px">${I.plus}</button>
      </div>
    </div>
  </div>`;
}

function login(id) {
  const all = [
    {id:'elias',name:'Elias Soares',role:'Técnico de Manutenção',color:'#58a6ff',initials:'ES'},
    {id:'supervisor',name:'Supervisor',role:'Supervisão',color:'#3fb950',initials:'SV'},
    ...S.extraUsers
  ];
  S.user = all.find(u => u.id === id) || all[0];
  saveDB(); render();
}
function addUser() {
  const inp = $('nu-inp');
  if (!inp || !inp.value.trim()) return;
  const nm = inp.value.trim();
  const colors = ['#f778ba','#fb923c','#a78bfa','#22d3ee','#fbbf24'];
  const u = {id:'u_'+Date.now(), name:nm, role:'Técnico', color:colors[S.extraUsers.length%5], initials:nm.substring(0,2).toUpperCase()};
  S.extraUsers.push(u); saveDB(); login(u.id);
}
function logout() { S.user = null; render(); }

        <div class="s-avatar" style="background:${u.color}20;color:${u.color}">${u.initials}</div>
        <div class="su-info" style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.name}</div>
          <div style="font-size:11px;color:var(--text2)">${u.role}</div>
        </div>
        <span style="color:var(--text3)">${I.logout}</span>
      </div>
      <nav class="sb-nav">
        <div style="padding:8px 16px 4px">
          <button class="desk-fab" onclick="openNew()">${I.plus}<span>Nova tarefa</span></button>
        </div>
        ${TABS.map(t => {
          const cnt = t.id==='corretivas' ? S.corretivas.filter(c=>c.status!=='concluido').length : 0;
          return `<button class="nav-item${S.tab===t.id?' active':''}" onclick="switchTab('${t.id}')">
            ${I[t.icon]}<span>${t.label}</span>

      <!-- Mobile header -->
      <div class="mob-header">
        <div class="mob-logo"><div class="logo-icon" style="width:22px;height:22px;font-size:12px">${I.settings}</div>Manutenção GLP</div>
        <div class="mob-actions">
          <button class="icon-btn" onclick="toggleTheme()">${I[S.theme==='dark'?'sun':'moon']}</button>
          <button class="icon-btn" onclick="openNotif()" style="position:relative">${I.bell}${notifBadge}</button>
        </div>
      </div>
      <!-- Desktop topbar -->
      <div class="topbar">
        <div class="topbar-title">${I[TABS.find(t=>t.id===S.tab)?.icon||'settings']} ${TAB_TITLES[S.tab]||''}</div>
        <span style="font-size:12px;color:var(--text2)">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</span>
      </div>

      <div class="page-content" id="page-content">${renderTab()}</div>

function switchTab(t) { S.tab = t; saveDB(); render(); }

function renderTab() {
  if (S.tab==='preventivas') return renderPreventivas();
  if (S.tab==='corretivas')  return renderCorretivas();
  if (S.tab==='indicadores') return renderIndicadores();
  if (S.tab==='relatorios')  return renderRelatorios();
  if (S.tab==='historico')   return renderHistorico();
  return '';
}
function renderInline() {
  const pc = $('page-content');
  if (pc) pc.innerHTML = renderTab();
}

// ─── PREVENTIVAS ─────────────────────────────────────────────────────────────
function renderPreventivas() {
  let tasks = S.preventivas;
  if (S.searchPrev) tasks = tasks.filter(t => t.nome.toLowerCase().includes(S.searchPrev.toLowerCase()));
  let h = `<div class="search-wrap">${I.search}<input placeholder="Buscar preventiva…" oninput="S.searchPrev=this.value;renderInline()" value="${S.searchPrev}"></div>`;
  DAYS.forEach((dia, idx) => {
    const dt = tasks.filter(p => p.dia === dia);
    if (!dt.length) return;
    const dn = dt.filter(t => t.done).length;
    const pct = dt.length ? Math.round(dn/dt.length*100) : 0;
    const isToday = idx === TODAY_IDX;
    h += `<div class="day-block">
      <div class="day-hdr">
        <span class="day-name${isToday?' day-today':''}">${dia}${isToday?' — Hoje':''}</span>
        <span class="day-count">${dn}/${dt.length}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill ${pct===100?'pf-done':pct>0?'pf-part':'pf-zero'}" style="width:${pct}%"></div></div>`;
    dt.forEach(t => {
      h += `<div class="task-row" onclick="togglePrev(${t.id})">
        <div class="chk${t.done?' done':''}">${t.done?I.check:''}</div>
        <div class="pdot p-${t.pri||'media'}"></div>
        <div class="task-info">
          <div class="task-name${t.done?' done':''}">${t.turno} — ${t.nome}</div>
          ${t.obs ? `<div class="task-sub">${t.obs}</div>` : ''}
          ${t.doneBy ? `<div class="task-sub">${I.user} ${t.doneBy} · ${t.doneAt}</div>` : ''}
        </div>
        <button class="task-edit-btn" onclick="event.stopPropagation();editPrev(${t.id})" title="Editar">${I.pencil}</button>
      </div>`;
    });
    h += `</div>`;
  });
  return h;
}

// ─── CORRETIVAS ──────────────────────────────────────────────────────────────
function renderCorretivas() {
  const f = S.filterCorr || 'todos';
  let list = S.corretivas;
  if (f==='aberto')    list = list.filter(c => c.status==='aberto');
  else if (f==='andamento') list = list.filter(c => c.status==='andamento');
  else if (f==='concluido') list = list.filter(c => c.status==='concluido');
  else if (f==='material') list = list.filter(c => c.mat);
  let h = `<div class="seg-ctrl">
    ${[['todos','Todos'],['aberto','Em aberto'],['andamento','Andamento'],['concluido','Concluídas'],['material','C/ Material']].map(([v,l]) =>
      `<button class="seg-btn${f===v?' active':''}" onclick="S.filterCorr='${v}';renderInline()">${l}</button>`
    ).join('')}
  </div>`;
  if (!list.length) { h += `<div class="empty">${I.check}<p>Nenhuma corretiva neste filtro</p></div>`; return h; }
  list.forEach(c => { h += cardCorr(c); });
  return h;
}

function cardCorr(c) {
  const sm = {aberto:'b-open', andamento:'b-prog', concluido:'b-done'};
  const sl = {aberto:'Em aberto', andamento:'Em andamento', concluido:'Concluída'};
  return `<div class="card">
    <div class="card-hdr">
      <div style="display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0">
        <div class="pdot p-${c.pri||'media'}" style="margin-top:5px"></div>
        <div class="card-title">${c.desc}</div>
      </div>
      <span class="badge ${sm[c.status]}">${sl[c.status]}</span>
    </div>
    <div class="meta">
      <span>${I.settings} ${c.equip}</span>
      <span>${I.user} ${c.resp}</span>
      <span>${I.calendar} ${c.inicio}</span>
      ${c.fim ? `<span>${I.flag} ${c.fim}</span>` : ''}
      ${c.req ? `<span>${I.package} ${c.req}</span>` : ''}
    </div>
    ${c.mat ? `<div class="mat-box">${I.alert}<span><strong>Material faltando:</strong> ${c.mat}</span></div>` : ''}
    ${c.obs ? `<div class="obs-box">${c.obs}</div>` : ''}
    <div class="btn-row">
      ${c.status!=='concluido' ? `<button class="btn btn-success" onclick="concluirCorr(${c.id})">${I.check} Concluir</button>` : ''}
      <button class="btn" onclick="editCorr(${c.id})">${I.pencil} Editar</button>
    </div>
  </div>`;
}

// ─── INDICADORES ─────────────────────────────────────────────────────────────
function renderIndicadores() {
  const total = S.corretivas.length;
  const abertas = S.corretivas.filter(c => c.status!=='concluido').length;
  const concluidas = S.corretivas.filter(c => c.status==='concluido').length;
  const semMat = S.corretivas.filter(c => c.mat).length;
  const pT = S.preventivas.length, pD = S.preventivas.filter(p=>p.done).length;
  const pPct = pT ? Math.round(pD/pT*100) : 0;
  const alta = S.corretivas.filter(c => c.pri==='alta' && c.status!=='concluido').length;
  const freq = {};
  S.corretivas.forEach(c => { freq[c.equip] = (freq[c.equip]||0) + 1; });
  const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1]);
  const maxF = sorted.length ? sorted[0][1] : 1;
  return `
    <div class="grid-4" style="margin-bottom:18px">
      <div class="stat-card">
        <div class="stat-lbl">${I.tool} Corretivas</div>
        <div class="stat-num">${total}</div>
        <div class="stat-sub">${abertas} em aberto</div>
        <div class="stat-trend ${abertas>2?'trend-down':'trend-up'}">${abertas>2?'⚠ Atenção':'✓ Ok'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">${I.calcheck} Preventivas</div>
        <div class="stat-num">${pPct}%</div>
        <div class="stat-sub">${pD}/${pT} concluídas</div>
        <div class="stat-trend ${pPct>=70?'trend-up':'trend-down'}">${pPct>=70?'✓ Em dia':'⚠ Atenção'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">${I.alert} Alta prioridade</div>
        <div class="stat-num">${alta}</div>
        <div class="stat-sub">corretivas urgentes</div>
        <div class="stat-trend ${alta>0?'trend-down':'trend-up'}">${alta>0?'⚠ Urgente':'✓ Nenhuma'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">${I.package} Requisições</div>
        <div class="stat-num">${semMat}</div>
        <div class="stat-sub">aguardando material</div>
      </div>
    </div>
    ${sorted.length ? `
    <span class="sec-lbl">Corretivas por equipamento</span>
    <div class="card" style="margin-bottom:14px">
      ${sorted.map(([eq,n]) => {
        const p = Math.round(n/maxF*100);
        const cls = p>=80?'bf-high':p>=50?'bf-mid':'bf-low';
        return `<div class="bar-row"><div class="bar-lbl" title="${eq}">${eq}</div>
          <div class="bar-track"><div class="bar-fill ${cls}" style="width:${p}%">${n}</div></div></div>`;
      }).join('')}
    </div>
    <div class="insight">
      <div class="insight-ttl">${I.bulb} Recomendação preventiva</div>
      <div class="insight-txt"><strong>${sorted[0][0]}</strong> concentra o maior número de corretivas (${sorted[0][1]}). Recomenda-se antecipar a preventiva desse equipamento para reduzir falhas não planejadas.</div>
    </div>` : ''}`;
}

// ─── RELATÓRIOS ──────────────────────────────────────────────────────────────
function renderRelatorios() {
  return `<span class="sec-lbl">Gerar relatório</span>
    <div class="card" style="margin-bottom:14px">
      <div class="form-grp"><label class="form-lbl">Período</label>
        <div style="display:flex;gap:8px">
          <button class="btn" id="rp-hoje" onclick="selPer('hoje',this)" style="border-color:var(--blue);color:var(--blue)">Hoje</button>
          <button class="btn" id="rp-semana" onclick="selPer('semana',this)">Semana</button>
          <button class="btn" id="rp-mes" onclick="selPer('mes',this)">Mês</button>
        </div>
      </div>
    </div>
    <button class="rpt-btn green" onclick="gerarRpt('whatsapp')">${I.wa} Enviar via WhatsApp</button>
    <button class="rpt-btn blue" onclick="gerarRpt('copiar')">${I.copy} Copiar resumo (texto)</button>
    <button class="rpt-btn" onclick="gerarRpt('imprimir')">${I.printer} Imprimir / Salvar PDF</button>
    <div id="rpt-out"></div>`;
}
function selPer(p, btn) {
  ['rp-hoje','rp-semana','rp-mes'].forEach(id => {
    const el = $(id); if(el){el.style.borderColor='';el.style.color='';}
  });
  if(btn){btn.style.borderColor='var(--blue)';btn.style.color='var(--blue)';}
}
function gerarRpt(tipo) {
  const hoje = new Date().toLocaleDateString('pt-BR');
  const pD = S.preventivas.filter(p=>p.done).length;
  const pP = S.preventivas.filter(p=>!p.done).length;
  const cAb = S.corretivas.filter(c=>c.status!=='concluido');
  const cFin = S.corretivas.filter(c=>c.status==='concluido');
  const semMat = S.corretivas.filter(c=>c.mat);
  let txt = `*RELATÓRIO MANUTENÇÃO GLP*\n*Data: ${hoje}*\n${'─'.repeat(32)}\n\n`;
  txt += `📋 *PREVENTIVAS*\n✅ Concluídas: ${pD}/${S.preventivas.length}\n⏳ Pendentes: ${pP}\n\n`;
  txt += `🔧 *CORRETIVAS*\n🔴 Em aberto: ${cAb.filter(c=>c.status==='aberto').length}\n🟡 Em andamento: ${cAb.filter(c=>c.status==='andamento').length}\n✅ Concluídas: ${cFin.length}\n`;
  if (semMat.length) { txt += `\n⚠️ *MATERIAIS NECESSÁRIOS*\n`; semMat.forEach(c => { txt += `• ${c.equip}: ${c.mat}${c.req?' ('+c.req+')':''}\n`; }); }
  if (cAb.length) { txt += `\n📌 *CORRETIVAS EM ABERTO*\n`; cAb.forEach(c => { txt += `• ${c.equip}: ${c.desc}\n  Desde: ${c.inicio}${c.obs?' | '+c.obs:''}\n`; }); }
  txt += `\n${'─'.repeat(32)}\nResponsável: ${S.user?.name||'—'}`;
  if (tipo==='whatsapp') {
    window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
  } else if (tipo==='copiar') {
    navigator.clipboard?.writeText(txt).then(() => toast('Copiado para área de transferência!'));
    const out = $('rpt-out');
    if(out) out.innerHTML = `<div class="rpt-pre">${txt.replace(/\*/g,'').replace(/</g,'&lt;')}</div>`;
  } else {
    const w = window.open('','_blank');
    if(w) {
      w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Relatório Manutenção GLP</title>
        <style>body{font-family:monospace;padding:30px;font-size:14px;line-height:1.9;color:#111;white-space:pre-wrap;max-width:700px;margin:0 auto}</style>
        </head><body>${txt.replace(/\*/g,'').replace(/</g,'&lt;')}</body></html>`);
      w.print();
    }
  }
}

// ─── HISTÓRICO ───────────────────────────────────────────────────────────────
function renderHistorico() {
  const conc = S.corretivas.filter(c => c.status==='concluido');
  const prevDone = S.preventivas.filter(p => p.done);
  return `
    <span class="sec-lbl">Corretivas concluídas</span>
    ${conc.length ? conc.map(c => `<div class="card">
      <div class="card-hdr"><div class="card-title">${c.desc}</div><span class="badge b-done">Concluída</span></div>
      <div class="meta">
        <span>${I.settings} ${c.equip}</span>
        <span>${I.user} ${c.resp}</span>
        <span>${I.calendar} ${c.inicio}</span>
        <span>${I.flag} ${c.fim||'—'}</span>
      </div>
      ${c.obs ? `<div class="obs-box">${c.obs}</div>` : ''}
    </div>`).join('') : `<div class="empty">${I.tool}<p>Nenhuma corretiva concluída ainda</p></div>`}
    <div class="divider"></div>
    <span class="sec-lbl">Preventivas concluídas</span>
    ${prevDone.length ? prevDone.map(t => `<div class="task-row" style="cursor:default">
      <div class="chk done">${I.check}</div>
      <div class="pdot p-${t.pri||'media'}"></div>
      <div class="task-info">
        <div class="task-name done">${t.turno} — ${t.nome}</div>
        <div class="task-sub">${t.dia} · ${t.doneBy||'—'} · ${t.doneAt||'—'}</div>
      </div>
    </div>`).join('') : `<div class="empty">${I.calcheck}<p>Nenhuma preventiva concluída ainda</p></div>`}`;
}

// ─── NOTIFICAÇÕES ────────────────────────────────────────────────────────────
function renderNotifDrawer() {
  const d = $('notif-drawer');
  if (!d) return;
  const unread = S.notificacoes.filter(n => !n.lida).length;
  const iconMap  = {alert:I.alert, mat:I.package, done:I.check};
  const colMap   = {alert:'var(--amber)', mat:'var(--pink)', done:'var(--green)'};
  d.innerHTML = `
    <div class="notif-hdr">
      <h2>${I.bell} Notificações ${unread?`<span class="badge b-open">${unread}</span>`:''}</h2>
      <button class="icon-btn" onclick="closeNotif()">${I.x}</button>
    </div>
    <div class="notif-list">
      ${S.notificacoes.length ? S.notificacoes.map(n => `
        <div class="notif-item${!n.lida?' notif-unread':''}" onclick="readNotif(${n.id})">
          <div class="ni-icon" style="background:${colMap[n.tipo]}20;color:${colMap[n.tipo]}">${iconMap[n.tipo]||I.bell}</div>
          <div class="ni-body">
            <div class="ntl">${n.titulo}</div>
            <div class="nsb">${n.sub}</div>
            <div class="nts">${n.ts}</div>
          </div>
        </div>`).join('')
      : `<div class="empty">${I.bell}<p>Sem notificações</p></div>`}
    </div>
    <div class="notif-footer">
      <button class="btn btn-full" onclick="marcarLidas()">${I.checks} Marcar todas como lidas</button>
    </div>`;
}
function openNotif() {
  $('notif-drawer')?.classList.add('open');
  $('backdrop')?.classList.add('open');
}
function closeNotif() {
  $('notif-drawer')?.classList.remove('open');
  $('backdrop')?.classList.remove('open');
}
function readNotif(id) {
  const n = S.notificacoes.find(x => x.id===id);
  if(n) n.lida = true;
  saveDB(); renderNotifDrawer(); render();
}
function marcarLidas() {
  S.notificacoes.forEach(n => n.lida = true);
  saveDB(); renderNotifDrawer(); render();
}

// ─── AÇÕES ───────────────────────────────────────────────────────────────────
function togglePrev(id) {
  const t = S.preventivas.find(p => p.id===id); if(!t) return;
  t.done = !t.done;
  if(t.done) { t.doneBy = S.user?.name||'?'; t.doneAt = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
  else { t.doneBy = ''; t.doneAt = ''; }
  saveDB(); renderInline();
  toast(t.done ? 'Preventiva concluída ✓' : 'Preventiva reaberta');
}
function editPrev(id) {
  const t = S.preventivas.find(p => p.id===id); if(!t) return;
  showModal(`<div class="modal-ttl">${I.calcheck} Editar preventiva</div>
    <div class="form-grp"><label class="form-lbl">Tarefa</label>
      <div style="font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border)">${t.turno} — ${t.nome}</div>
    </div>
    <div class="form-grp"><label class="form-lbl">Prioridade</label>
      <select class="form-sel" id="p-pri">
        <option value="alta"${t.pri==='alta'?' selected':''}>🔴 Alta</option>
        <option value="media"${t.pri==='media'?' selected':''}>🟡 Média</option>
        <option value="baixa"${t.pri==='baixa'?' selected':''}>🟢 Baixa</option>
      </select>
    </div>
    <div class="form-grp"><label class="form-lbl">Observação</label>
      <textarea class="form-ta" id="p-obs">${t.obs||''}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="savePrev(${id})">${I.check} Salvar</button>
      <button class="btn" onclick="closeModal()">${I.x} Cancelar</button>
    </div>`);
}
function savePrev(id) {
  const t = S.preventivas.find(p => p.id===id);
  if(t) { t.obs = qv('p-obs'); t.pri = qv('p-pri')||'media'; }
  saveDB(); closeModal(); renderInline(); toast('Preventiva atualizada');
}

function editCorr(id) {
  const c = S.corretivas.find(x => x.id===id); if(!c) return;
  showModal(`<div class="modal-ttl">${I.tool} Editar corretiva</div>
    <div class="form-grp"><label class="form-lbl">Equipamento</label>
      <input class="form-inp" id="e-eq" value="${c.equip}">
    </div>
    <div class="form-grp"><label class="form-lbl">Descrição</label>
      <textarea class="form-ta" id="e-desc">${c.desc}</textarea>
    </div>
    <div class="form-grp"><label class="form-lbl">Status</label>
      <select class="form-sel" id="e-st">
        <option value="aberto"${c.status==='aberto'?' selected':''}>Em aberto</option>
        <option value="andamento"${c.status==='andamento'?' selected':''}>Em andamento</option>
        <option value="concluido"${c.status==='concluido'?' selected':''}>Concluída</option>
      </select>
    </div>
    <div class="form-grp"><label class="form-lbl">Prioridade</label>
      <select class="form-sel" id="e-pri">
        <option value="alta"${c.pri==='alta'?' selected':''}>🔴 Alta</option>
        <option value="media"${c.pri==='media'?' selected':''}>🟡 Média</option>
        <option value="baixa"${c.pri==='baixa'?' selected':''}>🟢 Baixa</option>
      </select>
    </div>
    <div class="form-grp"><label class="form-lbl">Material faltando</label>
      <input class="form-inp" id="e-mat" value="${c.mat||''}" placeholder="Ex: 2x mangueira pneumática 1/2&quot;">
    </div>
    <div class="form-grp"><label class="form-lbl">Nº Requisição</label>
      <input class="form-inp" id="e-req" value="${c.req||''}" placeholder="Ex: REQ-046">
    </div>
    <div class="form-grp"><label class="form-lbl">Observação</label>
      <textarea class="form-ta" id="e-obs">${c.obs||''}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveCorr(${id})">${I.check} Salvar</button>
      <button class="btn" onclick="closeModal()">${I.x} Cancelar</button>
    </div>`);
}
function saveCorr(id) {
  const c = S.corretivas.find(x => x.id===id);
  if(c) {
    c.equip  = qv('e-eq')  || c.equip;
    c.desc   = qv('e-desc')|| c.desc;
    c.status = qv('e-st')  || c.status;
    c.pri    = qv('e-pri') || c.pri;
    c.mat    = qv('e-mat');
    c.req    = qv('e-req');
    c.obs    = qv('e-obs');
    if(c.status==='concluido' && !c.fim) c.fim = new Date().toLocaleDateString('pt-BR');
  }
  saveDB(); closeModal(); renderInline(); toast('Corretiva atualizada');
}
function concluirCorr(id) {
  const c = S.corretivas.find(x => x.id===id);
  if(c) { c.status='concluido'; c.fim=new Date().toLocaleDateString('pt-BR'); }
  saveDB(); renderInline(); toast('Corretiva concluída ✓');
}

// ─── NEW MODAL ───────────────────────────────────────────────────────────────
function openNew() {
  if (S.tab === 'preventivas') {
    showModal(`<div class="modal-ttl">${I.calcheck} Nova preventiva</div>
      <div class="form-grp"><label class="form-lbl">Dia da semana</label>
        <select class="form-sel" id="n-dia">${DAYS.map(d=>`<option>${d}</option>`).join('')}</select>
      </div>
      <div class="form-grp"><label class="form-lbl">Turno</label>
        <select class="form-sel" id="n-turno"><option>1º S</option><option>2º S</option><option>3º S</option><option>4º S</option></select>
      </div>
      <div class="form-grp"><label class="form-lbl">Prioridade</label>
        <select class="form-sel" id="n-pri">
          <option value="alta">🔴 Alta</option><option value="media" selected>🟡 Média</option><option value="baixa">🟢 Baixa</option>
        </select>
      </div>
      <div class="form-grp"><label class="form-lbl">Descrição da tarefa</label>
        <input class="form-inp" id="n-nome" placeholder="Ex: Lubrificação dos rodeiros…">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addPrev()">${I.check} Adicionar</button>
        <button class="btn" onclick="closeModal()">${I.x} Cancelar</button>
      </div>`);
  } else if (S.tab === 'corretivas') {
    showModal(`<div class="modal-ttl">${I.tool} Novo chamado / corretiva</div>
      <div class="form-grp"><label class="form-lbl">Equipamento</label>
        <input class="form-inp" id="c-eq" placeholder="Ex: Carrossel Linha 1">
      </div>
      <div class="form-grp"><label class="form-lbl">Descrição do problema</label>
        <textarea class="form-ta" id="c-desc" placeholder="Descreva o chamado…"></textarea>
      </div>
      <div class="form-grp"><label class="form-lbl">Status inicial</label>
        <select class="form-sel" id="c-st">
          <option value="aberto">Em aberto</option>
          <option value="andamento">Em andamento</option>
          <option value="concluido">Concluída</option>
        </select>
      </div>
      <div class="form-grp"><label class="form-lbl">Prioridade</label>
        <select class="form-sel" id="c-pri">
          <option value="alta">🔴 Alta</option><option value="media" selected>🟡 Média</option><option value="baixa">🟢 Baixa</option>
        </select>
      </div>
      <div class="form-grp"><label class="form-lbl">Material faltando (se houver)</label>
        <input class="form-inp" id="c-mat" placeholder="Ex: mangueira pneumática 1/2&quot;">
      </div>
      <div class="form-grp"><label class="form-lbl">Nº Requisição</label>
        <input class="form-inp" id="c-req" placeholder="Ex: REQ-046">
      </div>
      <div class="form-grp"><label class="form-lbl">Observação</label>
        <textarea class="form-ta" id="c-obs" placeholder="Detalhes adicionais…"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addCorr()">${I.check} Registrar</button>
        <button class="btn" onclick="closeModal()">${I.x} Cancelar</button>
      </div>`);
  }
}
function addPrev() {
  const nome = qv('n-nome').trim(); if(!nome) return;
  S.preventivas.push({
    id:S.nextId++, dia:qv('n-dia'), turno:qv('n-turno'), nome,
    pri:qv('n-pri')||'media', done:false, obs:'', doneBy:'', doneAt:''
  });
  saveDB(); closeModal(); renderInline(); toast('Preventiva adicionada');
}
function addCorr() {
  const eq = qv('c-eq').trim(), desc = qv('c-desc').trim();
  if(!eq || !desc) return;
  const status = qv('c-st');
  const hoje = new Date().toLocaleDateString('pt-BR');
  const mat = qv('c-mat');
  S.corretivas.push({
    id:S.nextId++, equip:eq, desc, status, pri:qv('c-pri')||'media',
    inicio:hoje, fim:status==='concluido'?hoje:'',
    obs:qv('c-obs'), mat, req:qv('c-req'), resp:S.user?.name||'?'
  });
  if(mat) {
    S.notificacoes.unshift({id:S.nextId++, tipo:'mat', titulo:'Material necessário registrado', sub:`${eq}: ${mat}`, lida:false, ts:'Agora'});
  }
  saveDB(); closeModal(); renderInline(); toast('Chamado registrado');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function showModal(inner) {
  $('modal-root').innerHTML = `<div class="overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">${inner}</div>
  </div>`;
}
function closeModal() { $('modal-root').innerHTML = ''; }

// ─── SERVICE WORKER (PWA offline) ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'mgl-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const rc = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, rc));
    return res;
  }).catch(() => caches.match('/'))));
});`;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
loadDB();
render();
</script>
